<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="A sharp culling knife">
  <rect width="32" height="32" rx="6" fill="#0a0a0b"/>
  <g transform="rotate(-38 16 16)">
    <!-- blade: a keen, single-edged point -->
    <path d="M12.8 12.9 L28 15.7 Q28.5 16 28 16.3 L12.8 19.1 Z" fill="#dcd7cb"/>
    <!-- spine shading -->
    <path d="M12.8 12.9 L28 15.7" stroke="#b7b1a6" stroke-width="0.5" fill="none"/>
    <!-- honed cutting edge, bloodied -->
    <path d="M12.8 19.1 L27.9 16.2" stroke="#9e2b2b" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- bolster -->
    <rect x="11.6" y="12.2" width="1.8" height="7.6" rx="0.8" fill="#8d8780"/>
    <!-- handle -->
    <rect x="3.4" y="13.1" width="8.6" height="5.8" rx="2.6" fill="#45413a"/>
    <circle cx="6" cy="16" r="0.72" fill="#211f1c"/>
    <circle cx="8.7" cy="16" r="0.72" fill="#211f1c"/>
  </g>
</svg>
